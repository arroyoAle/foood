name: foood
description: "A new Flutter project."
publish_to: 'none'
version: 0.0.1+24

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_fortune_wheel: ^1.3.2
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  uuid: ^4.5.2
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
  build_web_compilers: ^4.0.4
  mockito: ^5.6.1
  drift_dev: ^2.18.0


